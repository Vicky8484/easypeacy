<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indsend opskrift</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/forms.css">

    <link rel="icon" type="image/png" sizes="32x32" href="img-vid/epfavicon.webp">

    <script src="js/menu.js" defer></script>
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="img-vid/eplogo.webp" alt="Logo">
            </a>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Forside</a></li>
                <li><a href="opskrifter.html">Opskrifter</a></li>
                <li><a href="forms.html">Indsend opskrift</a></li>
                <li><a href="helloeasy.html">HelloEasy</a></li>
            </ul>
            <button class="burger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </nav>
    </header>
    <main>

        <section class="formSection">

            <h1>Indsend din egen opskrift</h1>

            <p class="formIntro">
                Har du en lækker opskrift du gerne vil dele med andre?
                Udfyld formularen herunder og send den til os!
            </p>

            <form id="recipeForm">

                <div class="form-group">
                    <label for="name">Dit navn</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="recipeTitle">Opskriftens navn</label>
                    <input type="text" id="recipeTitle" name="recipeTitle" required>
                </div>

                <div class="form-group">
                    <label for="ingredients">Ingredienser</label>
                    <textarea id="ingredients" name="ingredients" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="instructions">Instruktioner</label>
                    <textarea id="instructions" name="instructions" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label for="servings">Antal portioner</label>
                    <input type="number" id="servings" name="servings" min="1" required>
                </div>

                <button type="submit" class="orangeBtn button">Send opskrift</button>

            </form>

        </section>

    </main>
    <footer>
        <div class="footerInfo-box">
            <p>Email: easypeacyfood@gmail.com</p>
            <p>Telefon nummer: 12 34 56 78</p>
            <p>Easy Peacy HQ: Lynghamarvej 9</p>
        </div>
    </footer>
</body>

</html>
